<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Ledger Pro | Supabase Integrated</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-main: #0f172a; --text-muted: #64748b;
            --bg-app: #f8fafc; --bg-card: #ffffff; --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-app); color: var(--text-main); line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }

        /* --- Auth Overlay --- */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg-app); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; }

        /* --- Dashboard --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; margin-bottom: 3rem; }
        .stat-card { background: var(--bg-card); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); }
        .stat-card h4 { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
        .amt { font-size: 1.6rem; font-weight: 800; }

        /* --- Credit Cards --- */
        .credit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem; }
        .credit-card { background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); position: relative; }
        .card-completed { opacity: 0.7; grayscale: 0.5; background: #f1f5f9; }

        /* --- Target Saver Tooltip --- */
        .target-trigger { position: absolute; top: 15px; right: 15px; cursor: help; background: #fff7ed; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--warning); }
        .tooltip { position: absolute; top: 50px; right: 15px; background: #1e293b; color: white; padding: 12px; border-radius: 8px; width: 240px; font-size: 0.75rem; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 10; pointer-events: none; }
        .target-trigger:hover + .tooltip { opacity: 1; visibility: visible; }

        /* --- Modal --- */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 95%; max-width: 700px; padding: 2rem; border-radius: 24px; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .span-2 { grid-column: span 2; }

        input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; }
        button { cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; padding: 0.8rem 1.5rem; border-radius: 10px; font-weight: 700; }
        .btn-primary:hover { background: var(--primary-dark); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- AUTH SECTION -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="margin-bottom: 1.5rem;">Secure Login</h2>
            <form id="login-form">
                <label>Email</label>
                <input type="email" id="auth-email" required>
                <div style="margin-top: 1rem;">
                    <label>Password</label>
                    <input type="password" id="auth-password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 2rem;">Access Ledger</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="container">
        <header style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 2rem;">
            <div>
                <h1>Credit Health Tracker</h1>
                <button onclick="logout()" style="font-size: 0.8rem; color: var(--danger); background: none;">Logout</button>
            </div>
            <button class="btn-primary" onclick="toggleModal(true)">+ New Purchase</button>
        </header>

        <!-- DASHBOARD -->
        <div class="dashboard-grid">
            <div class="stat-card"><h4>Net Benefits</h4><div class="amt" id="stat-savings" style="color:var(--success)">₹0</div></div>
            <div class="stat-card"><h4>Total Friction</h4><div class="amt" id="stat-friction" style="color:var(--danger)">₹0</div></div>
            <div class="stat-card"><h4>Net Gain</h4><div class="amt" id="stat-net" style="color:var(--primary)">₹0</div></div>
            <div class="stat-card" style="border-left: 4px solid var(--warning);"><h4>Conv. Tax</h4><div class="amt" id="stat-conv" style="color:var(--warning)">₹0</div></div>
        </div>

        <section>
            <h2 style="margin-bottom: 1rem;">Ongoing EMIs</h2>
            <div class="credit-grid" id="ongoing-list"></div>
        </section>

        <section style="margin-top: 3rem;">
            <h2 style="margin-bottom: 1rem; color: var(--text-muted);">Completed</h2>
            <div class="credit-grid" id="completed-list"></div>
        </section>
    </div>

    <!-- INPUT MODAL -->
    <div class="modal" id="entry-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 1.5rem;">
                <h2>Add Credit Entry</h2>
                <button onclick="toggleModal(false)" style="font-size: 2rem;">&times;</button>
            </div>
            <form id="purchase-form" class="form-grid">
                <div class="span-2"><label>Item Name</label><input type="text" name="item_name" required></div>
                <div><label>Sticker Price</label><input type="number" name="sticker_price" required></div>
                <div><label>Monthly EMI</label><input type="number" name="emi_amount" required></div>
                <div><label>Tenure (Months)</label><input type="number" name="tenure" required></div>
                <div><label>Start Date</label><input type="date" name="start_date" required></div>
                
                <div class="span-2" style="font-size: 0.8rem; font-weight: 800; color: var(--primary); margin-top: 1rem;">PERKS & FRICTION</div>
                <div><label>Instant Discount</label><input type="number" name="instant_discount" value="0"></div>
                <div><label>Cashback</label><input type="number" name="cashback" value="0"></div>
                <div><label>Shipping Cost</label><input type="number" name="shipping_cost" value="0"></div>
                <div><label>Marketplace Fee</label><input type="number" name="marketplace_fee" value="0"></div>
                
                <div class="span-2" style="background: #f1f5f9; padding: 1rem; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="is_no_cost_emi" style="width: auto;">
                    <label>No-Cost EMI (Derived Interest from Discount)</label>
                </div>
                
                <div class="span-2"><button type="submit" class="btn-primary" style="width: 100%;">Analyze & Save to Supabase</button></div>
            </form>
        </div>
    </div>

    <script>
        // CONFIG - Replace with your actual Supabase credentials
        const SB_URL = 'YOUR_SUPABASE_URL';
        const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = document.getElementById('auth-overlay') ? supabase.createClient(SB_URL, SB_KEY) : null;

        // --- AUTH LOGIC ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else checkUser();
        };

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                initApp();
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // --- CORE APP LOGIC ---
        function toggleModal(show) { document.getElementById('entry-modal').style.display = show ? 'flex' : 'none'; }

        async function initApp() {
            loadSummary();
            loadItems();
        }

        async function loadSummary() {
            const { data } = await supabase.from('credit_summary').select('*').single();
            if (data) {
                document.getElementById('stat-savings').innerText = `₹${data.total_savings || 0}`;
                document.getElementById('stat-friction').innerText = `₹${data.total_friction || 0}`;
                document.getElementById('stat-net').innerText = `₹${data.net_gain || 0}`;
                document.getElementById('stat-conv').innerText = `₹${data.convenience_tax || 0}`;
            }
        }

        async function loadItems() {
            const { data, error } = await supabase.from('credit_items').select('*').order('created_at', { ascending: false });
            const ongoingList = document.getElementById('ongoing-list');
            const completedList = document.getElementById('completed-list');
            ongoingList.innerHTML = ''; completedList.innerHTML = '';

            data.forEach(item => {
                const totalFriction = Number(item.shipping_cost) + Number(item.marketplace_fee) + Number(item.processing_fee);
                const targetCashPrice = Number(item.sticker_price) + totalFriction - Number(item.instant_discount);
                
                const card = `
                    <article class="credit-card ${item.status === 'completed' ? 'card-completed' : ''}">
                        <div class="target-trigger">🎯</div>
                        <div class="tooltip">
                            <strong>Strategic Buy:</strong><br>
                            If you saved <strong>₹${targetCashPrice}</strong>, you'd avoid the credit friction.
                        </div>
                        <div style="margin-bottom:1rem">
                            <h3>${item.item_name}</h3>
                            <span style="font-size:0.7rem; color:var(--text-muted)">${item.tenure} Months • Started ${item.start_date}</span>
                        </div>
                        <div style="font-size:1.5rem; font-weight:800; color:var(--primary)">₹${item.emi_amount}</div>
                    </article>
                `;
                if(item.status === 'ongoing') ongoingList.innerHTML += card; else completedList.innerHTML += card;
            });
        }

        document.getElementById('purchase-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const entry = Object.fromEntries(formData.entries());
            const { data: { user } } = await supabase.auth.getUser();

            const { error } = await supabase.from('credit_items').insert([{
                ...entry,
                user_id: user.id,
                is_no_cost_emi: e.target.is_no_cost_emi.checked
            }]);

            if (error) alert(error.message); else { toggleModal(false); initApp(); }
        };

        window.onload = checkUser;
    </script>
</body>
</html>
