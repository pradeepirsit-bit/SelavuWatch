<div class="credit-card">
    <div class="credit-header">
        <div>
            <h2 class="credit-title">Home Renovation Loan</h2>
            <span class="status-badge">Active</span>
        </div>
        <div class="primary-metric">
            <span class="label">Monthly EMI</span>
            <span class="value">₹12,500</span>
        </div>
    </div>

    <div class="credit-body">
        <div class="detail-row">
            <div class="detail-item">
                <span class="label">Total Value</span>
                <span class="value emphasis">₹5,00,000</span>
            </div>
            <div class="detail-item">
                <span class="label">Start Date</span>
                <span class="value">15 Oct 2023</span>
            </div>
        </div>

        <div class="detail-grid">
            <div class="detail-item">
                <span class="label">Tenure</span>
                <span class="value">48 Months</span>
            </div>
            <div class="detail-item">
                <span class="label">Interest Rate</span>
                <span class="value">10.5% (₹52,500)</span>
            </div>
            <div class="detail-item">
                <span class="label">Down Payment</span>
                <span class="value">₹50,000</span>
            </div>
            <div class="detail-item">
                <span class="label">Processing Fee</span>
                <span class="value">₹2,500</span>
            </div>
            <div class="detail-item">
                <span class="label">GST/Taxes</span>
                <span class="value">₹450</span>
            </div>
            <div class="detail-item">
                <span class="label">Late Fees</span>
                <span class="value text-danger">₹500 / incident</span>
            </div>
        </div>
    </div>
    
    <div class="credit-footer">
        <progress value="12" max="48"></progress>
        <div class="progress-labels">
            <span>12 paid</span>
            <span>36 remaining</span>
        </div>
    </div>
</div>
